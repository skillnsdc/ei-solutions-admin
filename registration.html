```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EI Solutions Registration</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f4c81,#1b6fb8);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
text-align:center;
color:#0f4c81;
margin-bottom:25px;
}

label{
font-weight:bold;
font-size:14px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:#1b6fb8;
}

textarea{
height:70px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1b6fb8;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0f4c81;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h2>Retailer / Distributor Registration</h2>

<form>

<label>Select Type</label>
<select required>
<option value="">Select</option>
<option>Retailer</option>
<option>Distributor</option>
</select>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email ID</label>
<input type="email" placeholder="Enter email address" required>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter mobile number" required>

<label>Pincode</label>
<input type="number" placeholder="Enter pincode" required>

<label>Shop Address</label>
<textarea placeholder="Enter shop address"></textarea>

<label>Upload Shop Photo</label>
<input type="file" required>

<label>Upload PAN Card</label>
<input type="file" required>

<label>Upload Aadhaar Card</label>
<input type="file" required>

<button type="submit">Submit Registration</button>

</form>

<div class="footer">
EI SOLUTIONS Portal
</div>

</div>

</body>
</html>
```
